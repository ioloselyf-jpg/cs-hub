<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>cHIP sHOP BXTN — Operations Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:'Barlow',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#c8102e}

/* HEADER */
.hdr{background:#000;border-bottom:2px solid #c8102e;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.3rem;letter-spacing:3px;line-height:1;cursor:pointer}
.logo .r{color:#c8102e}
.logo-sub{font-size:0.45rem;letter-spacing:5px;color:#888;display:block;margin-top:2px;font-weight:400}
.hdr-right{display:flex;align-items:center;gap:10px}
.back-btn{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;padding:5px 12px;background:none;border:1px solid #333;color:#666;cursor:pointer;transition:all 0.15s}
.back-btn:hover{border-color:#c8102e;color:#fff}
.sbadge{font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;border:1px solid;padding:3px 8px}
.s-live{color:#4caf50;border-color:#4caf50}.s-conn{color:#666;border-color:#333}.s-err{color:#c8102e;border-color:#c8102e}

/* DASHBOARD */
.dash{max-width:900px;margin:0 auto;padding:32px 20px 80px}
.dash-hero{text-align:center;padding:40px 0 48px;border-bottom:1px solid #111;margin-bottom:40px}
.dash-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(3rem,9vw,6rem);letter-spacing:4px;line-height:0.95}
.dash-title .r{color:#c8102e}
.dash-sub{font-size:0.6rem;letter-spacing:5px;color:#888;margin-top:12px;text-transform:uppercase}
.dash-meta{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:2px;color:#444;margin-top:6px;text-transform:uppercase}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:2px}
.dash-card{background:#0a0a0a;border-left:3px solid #c8102e;padding:0;cursor:pointer;transition:background 0.15s;position:relative;overflow:hidden}
.dash-card:hover{background:#0f0f0f}
.dash-card.locked{border-left-color:#333}
.dash-card.open-access{border-left-color:#c8102e}
.dash-card-inner{padding:22px 20px}
.dash-icon{font-size:2rem;margin-bottom:12px;display:block}
.dash-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.1rem;letter-spacing:3px;text-transform:uppercase;color:#fff}
.dash-desc{font-size:0.72rem;color:#666;margin-top:6px;line-height:1.5}
.dash-badge{font-family:'Barlow Condensed',sans-serif;font-size:0.55rem;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border:1px solid;margin-top:10px;display:inline-block}
.badge-open{color:#4caf50;border-color:#4caf50}
.badge-locked{color:#555;border-color:#333}
.dash-arrow{position:absolute;bottom:18px;right:18px;color:#c8102e;font-size:1rem;opacity:0;transition:opacity 0.15s}
.dash-card:hover .dash-arrow{opacity:1}

/* PIN GATE */
.pin-gate{max-width:300px;margin:80px auto 0;text-align:center}
.pin-icon{font-size:2.5rem;margin-bottom:16px}
.pin-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.1rem;letter-spacing:4px;text-transform:uppercase;color:#fff;margin-bottom:6px}
.pin-sub{font-size:0.7rem;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #222;background:transparent;transition:all 0.15s}
.pin-dot.filled{background:#c8102e;border-color:#c8102e}
.pin-dot.error{background:#c8102e;border-color:#c8102e;animation:shake 0.3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:220px;margin:0 auto}
.pin-btn{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.3rem;padding:14px;background:#0d0d0d;border:1px solid #1a1a1a;color:#fff;cursor:pointer;transition:all 0.15s}
.pin-btn:hover{background:#1a1a1a;border-color:#333}
.pin-btn.empty{background:transparent;border:none;cursor:default}
.pin-error{font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:#c8102e;margin-top:12px;min-height:20px}

/* SECTION WRAPPER */
.section-wrap{max-width:960px;margin:0 auto;padding:20px 20px 100px}

/* ============ SHARED COMPONENTS ============ */
.hero{background:#000;border-bottom:1px solid #111;padding:32px 24px 24px;text-align:center}
.ht{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(2.5rem,7vw,5rem);letter-spacing:4px;line-height:0.95;text-transform:uppercase}
.ht .r{color:#c8102e}
.hero-sub{font-size:0.6rem;letter-spacing:5px;color:#888;margin-top:10px;text-transform:uppercase}
.scores{display:flex;gap:1px;justify-content:center;margin-top:22px;flex-wrap:wrap}
.score-box{background:#0d0d0d;border:1px solid #1a1a1a;padding:12px 20px;min-width:90px;text-align:center}
.score-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:2rem;line-height:1}
.score-lbl{font-family:'Barlow Condensed',sans-serif;font-size:0.55rem;letter-spacing:3px;color:#666;margin-top:4px;text-transform:uppercase}
.tabs{display:flex;border-bottom:1px solid #111;background:#000;overflow-x:auto}
.tab{flex:1;min-width:90px;background:none;border:none;border-bottom:3px solid transparent;padding:12px 8px 9px;color:#666;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.78rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.tab:hover{color:#fff;background:#0a0a0a}.tab.on{color:#fff;border-bottom-color:#c8102e;background:#0a0a0a}
.tab-ct{display:block;font-size:0.48rem;letter-spacing:1px;color:#555;margin-top:2px;font-weight:400;font-family:'Barlow',sans-serif}
.tab.on .tab-ct{color:#888}
.main{padding:20px 0 80px}
.section{border-left:3px solid #1a1a1a;border-bottom:1px solid #0d0d0d;background:#0a0a0a;margin-bottom:2px;transition:border-left-color 0.3s}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;cursor:pointer;transition:background 0.1s}
.sec-hdr:hover{background:#0f0f0f}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:0.92rem;letter-spacing:2px;text-transform:uppercase;color:#fff}
.sec-meta{font-size:0.57rem;letter-spacing:2px;color:#666;text-transform:uppercase;margin-top:2px}
.sec-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.sec-ct{font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;color:#444;letter-spacing:1px}
.chev{color:#c8102e;font-size:0.55rem;transition:transform 0.2s}.chev.op{transform:rotate(180deg)}
.sec-body{padding:0 18px 16px}
.callout{border-left:2px solid #c8102e;padding:8px 12px;background:rgba(200,16,46,0.05);margin-bottom:10px;font-size:0.74rem;color:#888;line-height:1.6}
.callout.gold{border-left-color:#333;background:rgba(255,255,255,0.02)}.callout strong{color:#c8102e}.callout.gold strong{color:#aaa}
.item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #0d0d0d}
.item:last-child{border-bottom:none}.item:hover{background:rgba(255,255,255,0.01)}
.chk{width:18px;height:18px;border:1px solid #222;flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-size:0.6rem;color:#fff;font-weight:900}
.chk:hover{border-color:#c8102e}.chk.on{background:#c8102e;border-color:#c8102e}
.i-title{font-size:0.82rem;font-weight:600;color:#ddd;line-height:1.4}
.i-title.done{color:#333;text-decoration:line-through}
.i-det{font-size:0.72rem;color:#555;margin-top:3px;line-height:1.5}
.i-law{font-size:0.57rem;color:#333;margin-top:3px}
.i-freq{font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;color:#c8102e;margin-top:3px;letter-spacing:2px;text-transform:uppercase;font-weight:700}
.ptag{font-family:'Barlow Condensed',sans-serif;font-size:0.56rem;letter-spacing:2px;text-transform:uppercase;padding:2px 6px;border:1px solid;font-weight:700}
.tc{color:#c8102e;border-color:#c8102e;background:rgba(200,16,46,0.08)}
.ti{color:#777;border-color:#333;background:transparent}
.ts{color:#444;border-color:#222;background:transparent}
.field-label{font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;letter-spacing:2px;text-transform:uppercase;color:#777;margin-bottom:4px;margin-top:12px;display:block}
.field-label:first-child{margin-top:0}
.txt-input{font-family:'Barlow',sans-serif;font-size:0.8rem;padding:8px 11px;background:#0d0d0d;border:1px solid #1a1a1a;color:#fff;outline:none;transition:border-color 0.2s;width:100%}
.txt-input::placeholder{color:#2a2a2a}.txt-input:focus{border-color:#c8102e}
.sel-input{font-family:'Barlow',sans-serif;font-size:0.8rem;padding:8px 11px;background:#0d0d0d;border:1px solid #1a1a1a;color:#fff;outline:none;width:100%;cursor:pointer}
.sel-input:focus{border-color:#c8102e}
.btn-red{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.8rem;letter-spacing:2px;text-transform:uppercase;padding:10px 20px;background:#c8102e;border:none;color:#fff;cursor:pointer;transition:all 0.15s}
.btn-red:hover{background:#9e0c23}
.btn-outline{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;padding:9px 18px;background:none;border:1px solid #333;color:#777;cursor:pointer;transition:all 0.15s}
.btn-outline:hover{border-color:#c8102e;color:#fff}
.pb{max-width:340px;margin:14px auto 0;height:2px;background:#1a1a1a}
.pf{height:100%;background:#c8102e;transition:width 0.5s ease,background 0.3s}
.empty-state{text-align:center;padding:48px 20px;font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;letter-spacing:3px;text-transform:uppercase;color:#333}

/* TEMPS */
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:2px}
.unit-card{background:#0a0a0a;border-left:3px solid #222}
.unit-card.ok{border-left-color:#4caf50}.unit-card.warn{border-left-color:#ff9800}.unit-card.danger{border-left-color:#c8102e}
.unit-hdr{padding:12px 14px 8px;border-bottom:1px solid #0d0d0d}
.unit-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:0.92rem;letter-spacing:2px;text-transform:uppercase;color:#fff}
.unit-type{font-size:0.56rem;letter-spacing:2px;color:#666;text-transform:uppercase;margin-top:2px}
.unit-limit{font-size:0.58rem;color:#777;margin-top:2px}
.unit-body{padding:12px 14px}
.temp-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.temp-wrap{position:relative;flex:1}
.temp-inp{width:100%;font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:900;padding:9px 32px 9px 10px;background:#111;border:1px solid #222;color:#fff;outline:none;letter-spacing:2px;transition:border-color 0.2s}
.temp-inp:focus{border-color:#c8102e}
.temp-inp.ok{border-color:#4caf50;color:#4caf50}.temp-inp.warn{border-color:#ff9800;color:#ff9800}.temp-inp.danger{border-color:#c8102e;color:#c8102e}
.temp-unit{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-family:'Barlow Condensed',sans-serif;font-size:0.75rem;color:#444}
.status-chip{font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;letter-spacing:1px;text-transform:uppercase;padding:4px 8px;border:1px solid;font-weight:700}
.chip-ok{color:#4caf50;border-color:#4caf50;background:rgba(76,175,80,0.08)}
.chip-warn{color:#ff9800;border-color:#ff9800;background:rgba(255,152,0,0.08)}
.chip-danger{color:#c8102e;border-color:#c8102e;background:rgba(200,16,46,0.08)}
.chip-empty{color:#2a2a2a;border-color:#111}
.log-btn{width:100%;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.8rem;letter-spacing:2px;text-transform:uppercase;padding:10px;background:#c8102e;border:none;color:#fff;cursor:pointer;margin-top:8px;transition:all 0.15s}
.log-btn:hover{background:#9e0c23}
.log-btn:disabled{background:#111;color:#2a2a2a;cursor:not-allowed}
.log-btn.logged{background:#0d1a0d;border:1px solid #4caf50;color:#4caf50}
.last-log{font-size:0.58rem;color:#444;margin-top:6px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase}
.action-inp{width:100%;font-family:'Barlow',sans-serif;font-size:0.72rem;padding:7px 9px;background:#111;border:1px solid #1a1a1a;color:#aaa;outline:none;resize:none;height:52px}
.action-inp:focus{border-color:#c8102e}
.action-lbl{font-family:'Barlow Condensed',sans-serif;font-size:0.57rem;letter-spacing:2px;text-transform:uppercase;color:#c8102e;margin-bottom:3px;display:block;margin-top:8px}
.session-bar{padding:16px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid #111;margin-bottom:16px}
.session-lbl{font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;letter-spacing:3px;text-transform:uppercase;color:#888;flex-shrink:0}
.sess-btns{display:flex;gap:2px;flex-wrap:wrap}
.sess-btn{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;padding:7px 14px;border:1px solid #222;background:none;color:#555;cursor:pointer;transition:all 0.15s;font-weight:700}
.sess-btn:hover{border-color:#c8102e;color:#fff}
.sess-btn.on{background:#c8102e;border-color:#c8102e;color:#fff}
.area-btns{display:flex;gap:2px;margin-bottom:16px}
.area-btn{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;padding:8px 18px;border:1px solid #222;background:none;color:#555;cursor:pointer;font-weight:700;transition:all 0.15s}
.area-btn:hover{border-color:#888;color:#fff}
.area-btn.on{background:#c8102e;border-color:#c8102e;color:#fff}
.submit-bar{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:2px solid #c8102e;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:14px;z-index:50}
.submit-sum{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;color:#777}
.submit-sum strong{color:#fff}
.submit-all{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.82rem;letter-spacing:2px;text-transform:uppercase;padding:10px 24px;background:#c8102e;border:none;color:#fff;cursor:pointer;transition:all 0.15s}
.submit-all:hover{background:#9e0c23}
.submit-all:disabled{background:#1a1a1a;color:#333;cursor:not-allowed}

/* TRAINING */
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:2px}
.staff-card{background:#0a0a0a;border-left:3px solid #222}
.staff-card.all-ok{border-left-color:#4caf50}.staff-card.expiring{border-left-color:#ff9800}.staff-card.overdue{border-left-color:#c8102e}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid #0d0d0d;cursor:pointer}
.card-hdr:hover{background:#0f0f0f}
.staff-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1rem;letter-spacing:2px;text-transform:uppercase;color:#fff}
.staff-role{font-size:0.58rem;letter-spacing:2px;color:#666;text-transform:uppercase;margin-top:2px}
.status-pill{font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border:1px solid;font-weight:700}
.pill-ok{color:#4caf50;border-color:#4caf50;background:rgba(76,175,80,0.08)}
.pill-exp{color:#ff9800;border-color:#ff9800;background:rgba(255,152,0,0.08)}
.pill-due{color:#c8102e;border-color:#c8102e;background:rgba(200,16,46,0.08)}
.pill-miss{color:#444;border-color:#222}
.train-row{display:grid;grid-template-columns:1fr 80px 70px;gap:6px;align-items:center;padding:7px 0;border-bottom:1px solid #0a0a0a}
.train-row:last-child{border-bottom:none}
.tr-name{font-size:0.72rem;color:#ccc;font-weight:500}
.tr-name.overdue{color:#c8102e}.tr-name.expiring{color:#ff9800}.tr-name.missing{color:#333}
.tr-date{font-family:'Barlow Condensed',sans-serif;font-size:0.66rem;color:#555;letter-spacing:1px}
.tr-badge{font-family:'Barlow Condensed',sans-serif;font-size:0.56rem;letter-spacing:1px;text-transform:uppercase;padding:2px 5px;border:1px solid;font-weight:700;text-align:center}
.tb-ok{color:#4caf50;border-color:#4caf50}.tb-exp{color:#ff9800;border-color:#ff9800}.tb-due{color:#c8102e;border-color:#c8102e}.tb-miss{color:#333;border-color:#1a1a1a}
.alert-banner{background:#0a0a0a;border-left:3px solid #c8102e;padding:10px 16px;margin-bottom:8px;display:flex;gap:10px}
.alert-text{font-size:0.75rem;color:#aaa;line-height:1.6}
.alert-text strong{color:#fff;display:block;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;font-size:0.78rem;text-transform:uppercase}
.matrix-wrap{overflow-x:auto}
.matrix-table{border-collapse:collapse;min-width:500px;width:100%}
.matrix-table th{font-family:'Barlow Condensed',sans-serif;font-size:0.56rem;letter-spacing:2px;text-transform:uppercase;padding:8px 10px;background:#0d0d0d;color:#777;border-bottom:1px solid #111;white-space:nowrap;text-align:center}
.matrix-table th.nc{text-align:left;min-width:140px}
.matrix-table td{padding:7px 10px;border-bottom:1px solid #080808;text-align:center;vertical-align:middle}
.matrix-table td.nc{text-align:left;font-size:0.78rem;color:#ddd;font-weight:500}
.m-dot{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:0.58rem;font-weight:900;margin:0 auto}
.d-ok{background:rgba(76,175,80,0.15);border:1px solid #4caf50;color:#4caf50}
.d-exp{background:rgba(255,152,0,0.15);border:1px solid #ff9800;color:#ff9800}
.d-due{background:rgba(200,16,46,0.15);border:1px solid #c8102e;color:#c8102e}
.d-miss{background:#0d0d0d;border:1px solid #1a1a1a;color:#1a1a1a}
.fab{position:fixed;bottom:24px;right:24px;background:#c8102e;border:none;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:0.8rem;letter-spacing:2px;text-transform:uppercase;padding:12px 20px;cursor:pointer;z-index:50;transition:all 0.15s;box-shadow:0 4px 20px rgba(200,16,46,0.4)}
.fab:hover{background:#9e0c23}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#0a0a0a;border:1px solid #222;border-top:3px solid #c8102e;width:100%;max-width:520px;max-height:88vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid #111}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:0.9rem;letter-spacing:3px;text-transform:uppercase;color:#fff}
.modal-close{background:none;border:none;color:#555;font-size:1.1rem;cursor:pointer}.modal-close:hover{color:#c8102e}
.modal-body{padding:18px}
.modal-foot{padding:13px 18px;border-top:1px solid #111;display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;padding:8px 18px;background:none;border:1px solid #222;color:#666;cursor:pointer}
.btn-cancel:hover{border-color:#555;color:#fff}
.btn-danger{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;padding:8px 18px;background:none;border:1px solid #c8102e;color:#c8102e;cursor:pointer;margin-right:auto}
.btn-danger:hover{background:#c8102e;color:#fff}

const PCLS={critical:'tc',important:'ti',standard:'ts'}
const PBCLS={critical:'section critical',important:'section important',standard:'section standard'}

function renderCompliance(app){
  const C=G.comp
  const allItems=Object.values(COMP_DATA).flatMap(t=>t.sections.flatMap(s=>s.items))
  const total=allItems.length
  const done=allItems.filter(i=>C.checked[i.id]).length
  const pct=total?Math.round(done/total*100):0
  const scoreColor=pct>=80?'#4caf50':pct>=50?'#aaa':'#c8102e'

  const allOnce=allItems.reduce((s,i)=>s+i.cost.once,0)
  const allAnnual=allItems.reduce((s,i)=>s+i.cost.annual,0)
  const actOnce=allItems.reduce((s,i)=>{const v=C.actuals[i.id+'_once'];return s+(v!=null?v:0)},0)
  const actAnnual=allItems.reduce((s,i)=>{const v=C.actuals[i.id+'_annual'];return s+(v!=null?v:0)},0)

  // Hero
  const hero=el('div','hero')
  hero.innerHTML=`<div class="ht">Stay <span class="r">Legal</span></div><div class="hero-sub">UK Compliance — ${done}/${total} complete</div>`
  const pb=el('div','pb');const pf=el('div','pf');pf.style.cssText=`width:${pct}%;background:${scoreColor}`;pb.appendChild(pf);hero.appendChild(pb)
  app.appendChild(hero)

  // Cost panel
  const cp=el('div','cost-panel')
  const ct=el('div','cost-toggle')
  ct.onclick=()=>{C.costOpen=!C.costOpen;render()}
  ct.innerHTML=`<div><div class="cost-toggle-title">💰 Projected vs Actual Costs</div><div class="cost-toggle-sub">One-off: ${fmt(allOnce)} — Annual: ${fmt(allAnnual)}/yr</div></div><span class="chev${C.costOpen?' op':''}">▼</span>`
  cp.appendChild(ct)
  if(C.costOpen){
    const ov=el('div','cost-overview')
    ;[
      {l:'Projected One-Off',v:fmt(allOnce),c:'c-proj'},
      {l:'Actual One-Off',v:actOnce>0?fmt(actOnce):'—',c:actOnce>allOnce?'c-over':actOnce>0?'c-actual':'c-proj'},
      {l:'Projected Annual',v:fmt(allAnnual),c:'c-proj'},
      {l:'Actual Annual',v:actAnnual>0?fmt(actAnnual)+'/yr':'—',c:actAnnual>allAnnual?'c-over':actAnnual>0?'c-actual':'c-proj'},
    ].forEach(s=>{
      const b=el('div','cost-ov')
      b.innerHTML=`<div class="cost-ov-num ${s.c}">${s.v}</div><div class="cost-ov-lbl">${s.l}</div>`
      ov.appendChild(b)
    })
    cp.appendChild(ov)
    // Detail
    const cs=el('div','cost-summary')
    ;['once','annual'].forEach(type=>{
      const block=el('div','cost-block')
      block.innerHTML=`<div class="cost-block-title">${type==='once'?'One-Off':'Annual Recurring'} Costs</div>`
      const hg=el('div','col-hdr-grid')
      hg.innerHTML='<div class="col-h-txt">Item</div><div class="col-h-txt r">Projected</div><div class="col-h-txt r">Actual</div>'
      block.appendChild(hg)
      const list=el('div','cost-list')
      allItems.filter(i=>i.cost[type]>0).forEach(i=>{
        const key=i.id+'_'+type
        const actual=C.actuals[key]
        const isOver=actual!=null&&actual>i.cost[type]
        const row=el('div','cost-row')
        row.innerHTML=`<div class="cost-rn${C.checked[i.id]?' done':''}">${i.title}</div><div class="cost-proj${C.checked[i.id]?' done':''}">${fmt(i.cost[type])}${type==='annual'?'/yr':''}</div>`
        const aw=el('div','actual-wrap')
        const sym=el('span','actual-sym');sym.textContent='£'
        const ainp=el('input','actual-inp'+(isOver?' over':''));ainp.type='number';ainp.min='0';ainp.placeholder='—'
        ainp.value=actual!=null?actual:''
        ainp.onchange=async e=>{
          const n=e.target.value===''?null:parseFloat(e.target.value)
          C.actuals[key]=n
          await db.from('compliance_actuals').upsert({item_id:i.id,cost_type:type,actual_cost:n},{onConflict:'item_id,cost_type'})
          render()
        }
        aw.appendChild(sym);aw.appendChild(ainp);row.appendChild(aw)
        list.appendChild(row)
      })
      block.appendChild(list)
      block.innerHTML+=`<div class="cost-note">* Enter actual costs paid. Red = over projected.</div>`
      cs.appendChild(block)
    })
    cp.appendChild(cs)
  }
  app.appendChild(cp)

  // Tabs
  const tabs=el('div','tabs')
  Object.entries(COMP_DATA).forEach(([key,tab])=>{
    const items=tab.sections.flatMap(s=>s.items)
    const d=items.filter(i=>C.checked[i.id]).length
    const t=el('button','tab'+(C.tab===key?' on':''))
    t.innerHTML=`${tab.label}<span class="tab-ct">${d}/${items.length}</span>`
    t.onclick=()=>{C.tab=key;render()}
    tabs.appendChild(t)
  })
  app.appendChild(tabs)

  const main=el('div','section-wrap')
  const tabData=COMP_DATA[C.tab]
  tabData.sections.forEach(sec=>{
    const isOpen=!!C.openSecs[sec.id]
    const sDone=sec.items.filter(i=>C.checked[i.id]).length
    const allDone=sDone===sec.items.length
    const div=el('div','section'+(allDone?' all-done':''))
    div.style.borderLeftColor=allDone?'#4caf50':sec.pri==='critical'?'#c8102e':sec.pri==='important'?'#555':'#222'
    const shdr=el('div','sec-hdr')
    shdr.onclick=()=>{C.openSecs[sec.id]=!isOpen;render()}
    shdr.innerHTML=`<div><div class="sec-title">${sec.title}${allDone?' ✓':''}</div><div class="sec-meta">${sec.meta}</div></div>`
    const sr=el('div','sec-right')
    sr.innerHTML=`<span class="ptag ${PCLS[sec.pri]}">${sec.pri}</span><span class="sec-ct">${sDone}/${sec.items.length}</span><span class="chev${isOpen?' op':''}">▼</span>`
    shdr.appendChild(sr);div.appendChild(shdr)
    if(isOpen){
      const sbody=el('div','sec-body')
      if(sec.callout){
        const co=el('div','callout'+(sec.callout.t==='gold'?' gold':''))
        co.innerHTML=`<strong>⚠ </strong>${sec.callout.txt}`
        sbody.appendChild(co)
      }
      sec.items.forEach(item=>{
        const isDone=!!C.checked[item.id]
        const irow=el('div','item')
        const chk=el('div','chk'+(isDone?' on':''))
        chk.textContent=isDone?'✓':'';chk.onclick=()=>toggleCheck(item.id)
        const itxt=el('div');itxt.style.flex='1'
        itxt.innerHTML=`<div class="i-title${isDone?' done':''}">${item.title}</div>`
        if(!isDone){
          itxt.innerHTML+=`<div class="i-det">${item.det}</div>`
          if(item.law)itxt.innerHTML+=`<div class="i-law">📜 ${item.law}</div>`
          itxt.innerHTML+=`<div class="i-freq">${item.freq}</div>`
          const costs=el('div','item-costs')
          if(item.cost.once>0){const b=el('span','cbadge cb-once');b.textContent='One-off: '+fmt(item.cost.once);costs.appendChild(b)}
          if(item.cost.annual>0){const b=el('span','cbadge cb-ann');b.textContent='Annual: '+fmt(item.cost.annual)+'/yr';costs.appendChild(b)}
          if(costs.children.length)itxt.appendChild(costs)
          if(item.cost.note){const n=el('div','icost-note');n.textContent=item.cost.note;itxt.appendChild(n)}
        }
        irow.appendChild(chk);irow.appendChild(itxt);sbody.appendChild(irow)
      })
      div.appendChild(sbody)
    }
    main.appendChild(div)
  })
  app.appendChild(main)
}

async function toggleCheck(id){
  const v=!G.comp.checked[id]
  G.comp.checked[id]=v
  await db.from('compliance_checks').upsert({item_id:id,is_checked:v,updated_at:new Date().toISOString()},{onConflict:'item_id'})
  render()
}

function getTempStatus(unit,val){
  if(val===''||val===null||val===undefined)return'empty'
  const n=parseFloat(val);if(isNaN(n))return'empty'
  if(unit.type==='freezer')return n<=unit.max?'ok':n>unit.warn?'danger':'warn'
  return n<=unit.max?'ok':n>=unit.warn?'danger':'warn'
}

    const action=T.actions[unit.id]||''
    const s=getTempStatus(unit,val)
    const isLogged=!!T.submitted[unit.id]
    const card=el('div','unit-card'+(s!=='empty'?' '+s:''))

    const uhdr=el('div','unit-hdr')
    uhdr.innerHTML=`<div class="unit-name">${unit.num} — ${unit.name}</div><div class="unit-type">${unit.area} · ${unit.type}</div><div class="unit-limit">${unit.type==='freezer'?'Legal max: -18°C':'Legal max: 8°C'} · Target: ≤${unit.max}°C</div>`
    card.appendChild(uhdr)

    const ubody=el('div','unit-body')
    const trow=el('div','temp-row')
    const tw=el('div','temp-wrap')
    const tinp=el('input','temp-inp'+(s!=='empty'?' '+s:''))
    tinp.type='text';tinp.inputMode='decimal';tinp.placeholder='0.0'
    tinp.value=val!==undefined?val:'';if(isLogged)tinp.disabled=true
    tinp.oninput=e=>{
      const raw=e.target.value
      if(raw===''||raw==='-'||/^-?\d*\.?\d*$/.test(raw)){T.readings[unit.id]=raw;render()}
      else e.target.value=val!==undefined?val:''
    }
    const tu=el('span','temp-unit');tu.textContent='°C'
    tw.appendChild(tinp);tw.appendChild(tu)

    const chipMap={ok:'chip-ok ✓ OK',warn:'chip-warn ⚠ CHECK',danger:'chip-danger ✕ ACTION',empty:'chip-empty —'}
    const [chipCls,chipTxt]=(chipMap[s]||chipMap.empty).split(' ').reduce((a,v,i)=>i===0?[v,a[1]]:a[0].length&&i>0?[a[0],a[1]+' '+v]:[v,''],['',' '])
    const chip=el('div','status-chip '+s.split(' ')[0].replace(/ok|warn|danger|empty/,m=>m==='ok'?'chip-ok':m==='warn'?'chip-warn':m==='danger'?'chip-danger':'chip-empty'))
    chip.textContent=s==='ok'?'✓ OK':s==='warn'?'⚠ CHECK':s==='danger'?'✕ ACTION':'—'
    trow.appendChild(tw);trow.appendChild(chip)
    ubody.appendChild(trow)
    ubody.innerHTML+=`<div class="unit-limit" style="margin-bottom:6px">${unit.note}</div>`

    if((s==='warn'||s==='danger')&&!isLogged){
      const al=el('span','action-lbl');al.textContent='⚠ Corrective Action Required'
      const ai=el('textarea','action-inp');ai.placeholder='Describe action taken…';ai.value=action
      ai.oninput=e=>{T.actions[unit.id]=e.target.value}
      ubody.appendChild(al);ubody.appendChild(ai)
    }

    const logbtn=el('button','log-btn'+(isLogged?' logged':''))
    logbtn.textContent=isLogged?'✓ Logged':'Log This Reading'
    logbtn.disabled=isLogged||val===undefined||val===''||val==='-'
    logbtn.onclick=()=>logSingleTemp(unit)
    ubody.appendChild(logbtn)

    const ll=el('div','last-log')
    const lastEntry=T.unitHist[unit.id]?.[0]
    ll.textContent=lastEntry?`Last: ${new Date(lastEntry.logged_at).toLocaleDateString('en-GB',{day:'2-digit',month:'short'})} ${new Date(lastEntry.logged_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})} — ${lastEntry.temperature}°C by ${lastEntry.staff_name||'?'}`:'No logs yet today'
    ubody.appendChild(ll)
    card.appendChild(ubody);grid.appendChild(card)
  })
  main.appendChild(grid);app.appendChild(main)

  // Submit bar
  const subbar=el('div','submit-bar')
  const sum=el('div','submit-sum')
  sum.innerHTML=`<strong>${logged}/${units.length}</strong> units logged this ${T.session} service`
  const filledCount=units.filter(u=>T.readings[u.id]!==undefined&&T.readings[u.id]!==''&&T.readings[u.id]!=='-').length
  const subbtn=el('button','submit-all')
  subbtn.textContent=`Submit All ${T.tab==='kitchen'?'Kitchen':'Bar'} Readings`
  subbtn.disabled=filledCount===0||logged===units.length
  subbtn.onclick=()=>logAllTemps(units)
  subbar.appendChild(sum);subbar.appendChild(subbtn);app.appendChild(subbar)
}

async function logSingleTemp(unit){
  const T=G.temps
  const val=T.readings[unit.id]
  if(!val||val==='-')return
  if(!T.staffName.trim()){alert('Please enter your name.');return}
  const s=getTempStatus(unit,val)
  if((s==='warn'||s==='danger')&&!T.actions[unit.id]?.trim()){alert('Please add corrective action for '+unit.name);return}
  const row={unit_id:unit.id,unit_name:unit.name,area:unit.area,session:T.session,temperature:parseFloat(val),corrective_action:T.actions[unit.id]||null,staff_name:T.staffName.trim(),logged_at:new Date().toISOString(),log_date:todayStr()}
  const{error}=await db.from('temperature_logs').insert(row)
  if(error){alert('Error: '+error.message);return}
  T.submitted[unit.id]=true
  if(!T.unitHist[unit.id])T.unitHist[unit.id]=[]
  T.unitHist[unit.id].unshift(row);render()
}

async function logAllTemps(units){
  const T=G.temps
  if(!T.staffName.trim()){alert('Please enter your name.');return}
  const toLog=units.filter(u=>T.readings[u.id]&&T.readings[u.id]!=='-'&&!T.submitted[u.id])
  for(const u of toLog){
    const s=getTempStatus(u,T.readings[u.id])
    if((s==='warn'||s==='danger')&&!T.actions[u.id]?.trim()){alert('Add corrective action for '+u.name);return}
  }
  const rows=toLog.map(u=>({unit_id:u.id,unit_name:u.name,area:u.area,session:T.session,temperature:parseFloat(T.readings[u.id]),corrective_action:T.actions[u.id]||null,staff_name:T.staffName.trim(),logged_at:new Date().toISOString(),log_date:todayStr()}))
  if(!rows.length)return
  const{error}=await db.from('temperature_logs').insert(rows)
  if(error){alert('Error: '+error.message);return}
  rows.forEach(r=>{T.submitted[r.unit_id]=true;if(!T.unitHist[r.unit_id])T.unitHist[r.unit_id]=[];T.unitHist[r.unit_id].unshift(r)})
  render()
}

function getFireRisk(id){return G.fire.responses[id]?.risk||null}
function getFireNote(id){return G.fire.responses[id]?.notes||''}
function getFireAction(id){return G.fire.responses[id]?.actionNotes||''}
function getFireActionChk(id,a){return G.fire.responses[id]?.actions?.[a]||false}
function getPremNote(id){return G.fire.premNotes[id]||''}

function fireOverall(){
  const items=FIRE_SECTIONS.flatMap(s=>s.items.filter(i=>i.risk&&getFireRisk(i.id)&&getFireRisk(i.id)!=='na'))
  if(!items.length)return null
  const high=items.filter(i=>getFireRisk(i.id)==='high').length
  const med=items.filter(i=>getFireRisk(i.id)==='med').length
  if(high>=3)return'HIGH'
  if(high>=1)return'MEDIUM-HIGH'
  if(med>=3)return'MEDIUM'
  return'LOW'
}

    const highItems=FIRE_SECTIONS.flatMap(s=>s.items.filter(i=>i.risk&&getFireRisk(i.id)==='high'))
    if(highItems.length){

const TRAINING_TYPES=[
  {id:'food2',name:'Level 2 Food Safety',validYears:3,required:true,law:'Food Hygiene Regs 2006'},
  {id:'food3',name:'Level 3 Food Safety',validYears:3,required:false,law:'Food Hygiene Regs 2006'},
  {id:'fire',name:'Fire Safety Training',validYears:1,required:true,law:'RRO 2005'},
  {id:'firstaid',name:'First Aid at Work',validYears:3,required:false,law:'H&S (First Aid) Regs 1981'},
  {id:'manual',name:'Manual Handling',validYears:3,required:true,law:'Manual Handling Regs 1992'},
  {id:'allergen',name:'Allergen Awareness',validYears:2,required:true,law:"Natasha's Law 2021"},
  {id:'haccp',name:'HACCP / Food Safety Mgmt',validYears:3,required:false,law:'EC Reg 852/2004'},
  {id:'coshh',name:'COSHH — Cleaning Chemicals',validYears:2,required:true,law:'COSHH Regs 2002'},
  {id:'rtw',name:'Right to Work Check',validYears:0,required:true,law:'Immigration Act 2006'},
  {id:'induction',name:'Full Induction',validYears:0,required:true,law:'Employment Rights Act 1996'},
]
const ROLES=['Kitchen Staff','Bar Staff','Manager','Floor Staff','Designated First Aider']
const WARN_DAYS=60

function trainStatus(t){
  if(!t||!t.completedDate)return'missing'
  const type=TRAINING_TYPES.find(tt=>tt.id===t.typeId)
  if(!type||type.validYears===0)return'ok'
  if(!t.expiryDate)return'ok'
  const d=daysUntil(t.expiryDate)
  if(d<0)return'overdue'
  if(d<=WARN_DAYS)return'expiring'
  return'ok'
}

function staffOverall(member){
  const req=TRAINING_TYPES.filter(t=>t.required)
  const ss=req.map(type=>{const t=member.training?.[type.id];return trainStatus(t?{...t,typeId:type.id}:null)})
  if(ss.includes('overdue'))return'overdue'
  if(ss.includes('expiring')||ss.includes('missing'))return'expiring'
  return'all-ok'
}

function getAlerts(){
  const alerts=[]
  G.train.staff.filter(s=>s.active).forEach(member=>{
    TRAINING_TYPES.filter(t=>t.required).forEach(type=>{
      const t=member.training?.[type.id]
      const s=trainStatus(t?{...t,typeId:type.id}:null)
      if(s==='overdue')alerts.push({name:member.name,training:type.name,days:daysUntil(t?.expiryDate),type:'overdue'})
      else if(s==='expiring'&&t?.expiryDate)alerts.push({name:member.name,training:type.name,days:daysUntil(t.expiryDate),type:'expiring'})
      else if(s==='missing')alerts.push({name:member.name,training:type.name,days:null,type:'missing'})
    })
  })
  return alerts.sort((a,b)=>(a.days??-999)-(b.days??-999))
}

async function saveStaff(){
  if(!G.train.editData.name?.trim()){alert('Please enter a name.');return}
  const isEdit=G.modal.mode==='edit'
  const payload={name:G.train.editData.name.trim(),role:G.train.editData.role||ROLES[0],training:G.train.editData.training||{},active:true,updated_at:new Date().toISOString()}
  if(isEdit){
    await db.from('staff_training').update(payload).eq('id',G.modal.staffId)
    const idx=G.train.staff.findIndex(s=>s.id===G.modal.staffId)
    if(idx>=0)G.train.staff[idx]={...G.train.staff[idx],...payload}
  } else {
    const{data}=await db.from('staff_training').insert(payload).select().single()
    if(data)G.train.staff.push({...payload,id:data.id})
  }
  G.modal=null;render()
}

async function archiveStaff(id){
  if(!confirm('Archive this staff member?'))return
  await db.from('staff_training').update({active:false}).eq('id',id)
  G.train.staff=G.train.staff.filter(s=>s.id!==id);G.modal=null;render()
}

function getCountdown(date,time){
  const target=new Date(date+'T'+time+':00')
  const diff=target-new Date()
  if(diff<=0)return null
  return{days:Math.floor(diff/86400000),hours:Math.floor((diff%86400000)/3600000),mins:Math.floor((diff%3600000)/60000)}
}

async function searchLoyaltyCard(){
  if(!G.wc.searchName.trim())return
  const{data}=await db.from('loyalty_cards').select('*').ilike('name','%'+G.wc.searchName.trim()+'%')
  if(data?.length){G.wc.currentCard=data[0]}else{alert('No card found for "'+G.wc.searchName+'". Create one with + New Card.')}
  render()
}

async function createLoyaltyCard(){
  if(!G.wc.newName.trim()){alert('Please enter a name.');return}
  const{data,error}=await db.from('loyalty_cards').insert({name:G.wc.newName.trim(),phone:G.wc.newPhone.trim()||null,pints:0,history:[],created_at:new Date().toISOString()}).select().single()
  if(error){alert('Error: '+error.message);return}
  G.wc.cards.unshift(data);G.wc.currentCard=data;G.wc.newName='';G.wc.newPhone='';G.modal=null;render()
}

async function stampCard(id){
  const card=G.wc.cards.find(c=>c.id===id)||G.wc.scanResult?.card
  if(!card)return
  const np=card.pints+1
  const nh=[{date:new Date().toISOString(),type:'stamp'},...(card.history||[])].slice(0,20)
  const update={pints:np,history:nh,updated_at:new Date().toISOString()}
  const{error}=await db.from('loyalty_cards').update(update).eq('id',id)
  if(error){alert('Error: '+error.message);return}
  const idx=G.wc.cards.findIndex(c=>c.id===id);if(idx>=0)G.wc.cards[idx]={...G.wc.cards[idx],...update}
  if(G.wc.currentCard?.id===id)G.wc.currentCard={...G.wc.currentCard,...update}
  if(G.wc.scanResult?.card?.id===id)G.wc.scanResult.card={...G.wc.scanResult.card,...update}
  render()
}

async function redeemPint(id){
  if(!confirm('Confirm free pint redeemed?'))return
  const card=G.wc.cards.find(c=>c.id===id);if(!card)return
  const nh=[{date:new Date().toISOString(),type:'redeem'},...(card.history||[])].slice(0,20)
  const update={pints:0,history:nh,updated_at:new Date().toISOString()}
  await db.from('loyalty_cards').update(update).eq('id',id)
  const idx=G.wc.cards.findIndex(c=>c.id===id);if(idx>=0)G.wc.cards[idx]={...G.wc.cards[idx],...update}
  if(G.wc.currentCard?.id===id)G.wc.currentCard={...G.wc.currentCard,...update}
  G.wc.scanResult=null;G.wc.scanId='';render()
}

async function lookupLoyalty(id){
  if(!id.trim())return
  const{data}=await db.from('loyalty_cards').select('*').eq('id',id.trim()).single()
  G.wc.scanResult=data?{found:true,card:data}:{found:false}
  if(data){const idx=G.wc.cards.findIndex(c=>c.id===data.id);if(idx>=0)G.wc.cards[idx]=data;else G.wc.cards.unshift(data)}
  render()
}

let scanStream=null,scanFrame=null
async function initScan(){
  try{
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280}}})
    const vid=document.getElementById('scanner-video');if(!vid){stopScan();return}
    vid.srcObject=scanStream;vid.setAttribute('playsinline','true');await vid.play()
    const canvas=document.createElement('canvas')
    const tick=()=>{
      if(!G.wc.scanning)return
      if(vid.readyState===vid.HAVE_ENOUGH_DATA){
        canvas.width=vid.videoWidth;canvas.height=vid.videoHeight
        const ctx=canvas.getContext('2d');ctx.drawImage(vid,0,0,canvas.width,canvas.height)
        const img=ctx.getImageData(0,0,canvas.width,canvas.height)
        const code=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'})
        if(code?.data){stopScan();lookupLoyalty(code.data.trim());return}
      }
      scanFrame=requestAnimationFrame(tick)
    }
    scanFrame=requestAnimationFrame(tick)
  }catch(e){G.wc.scanErr=e.name==='NotAllowedError'?'Camera permission denied.':'Camera error: '+e.message;G.wc.scanning=false;render()}
}

function stopScan(){
  if(scanFrame){cancelAnimationFrame(scanFrame);scanFrame=null}
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null}
  const vid=document.getElementById('scanner-video');if(vid)vid.srcObject=null
  G.wc.scanning=false
}

// ============================================================
// INIT — Load all data
// ============================================================
async function init(){
  G.status='connecting';render()

  const[compRes,actualsRes,tempsRes,fireRes,trainRes,loyaltyRes]=await Promise.all([
    db.from('compliance_checks').select('item_id,is_checked'),
    db.from('compliance_actuals').select('item_id,cost_type,actual_cost'),
    db.from('temperature_logs').select('*').eq('log_date',todayStr()).order('logged_at',{ascending:false}),
    db.from('fire_assessments').select('*').eq('id','chipshop-bxtn-378').single(),
    db.from('staff_training').select('*').eq('active',true).order('name'),
    db.from('loyalty_cards').select('*').order('created_at',{ascending:false}),
  ])

  // Compliance
  if(compRes.data){compRes.data.forEach(r=>{G.comp.checked[r.item_id]=r.is_checked})}
  if(actualsRes.data){actualsRes.data.forEach(r=>{G.comp.actuals[r.item_id+'_'+r.cost_type]=r.actual_cost})}

  // Temps — load today's history per unit
  if(tempsRes.data){
    tempsRes.data.forEach(row=>{
      if(!G.temps.unitHist[row.unit_id])G.temps.unitHist[row.unit_id]=[]
      G.temps.unitHist[row.unit_id].push(row)
    })
  }

  // Fire
  if(fireRes.data){
    const d=fireRes.data
    G.fire.assessorName=d.assessor_name||'';G.fire.assessorRole=d.assessor_role||''
    G.fire.assessorDate=d.assessment_date||todayStr();G.fire.reviewDate=d.review_date||''
    G.fire.responses=d.responses||{};G.fire.premNotes=d.premises_notes||{}
  }

  // Training
  if(trainRes.data){
    G.train.staff=trainRes.data.map(r=>({id:r.id,name:r.name,role:r.role,training:r.training||{},active:r.active}))
  }

  // Loyalty
  if(loyaltyRes.data)G.wc.cards=loyaltyRes.data

  // Session based on time
  const h=new Date().getHours()
  G.temps.session=h<11?'Opening':h<16?'Midday':'Closing'

  G.status='live'

  // Real-time subscriptions
  db.channel('hub-compliance').on('postgres_changes',{event:'*',schema:'public',table:'compliance_checks'},p=>{if(p.new)G.comp.checked[p.new.item_id]=p.new.is_checked;render()}).subscribe()
  db.channel('hub-temps').on('postgres_changes',{event:'INSERT',schema:'public',table:'temperature_logs'},p=>{const r=p.new;if(!G.temps.unitHist[r.unit_id])G.temps.unitHist[r.unit_id]=[];G.temps.unitHist[r.unit_id].unshift(r);render()}).subscribe()
  db.channel('hub-loyalty').on('postgres_changes',{event:'*',schema:'public',table:'loyalty_cards'},async()=>{const{data}=await db.from('loyalty_cards').select('*').order('created_at',{ascending:false});if(data)G.wc.cards=data;render()}).subscribe()
  db.channel('hub-training').on('postgres_changes',{event:'*',schema:'public',table:'staff_training'},async()=>{const{data}=await db.from('staff_training').select('*').eq('active',true).order('name');if(data)G.train.staff=data.map(r=>({id:r.id,name:r.name,role:r.role,training:r.training||{},active:r.active}));render()}).subscribe()

  setInterval(()=>render(),60000)
  render()
}

init()
</script>

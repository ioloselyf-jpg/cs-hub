<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>cHIP sHOP BXTN — Appliance Load Test</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box}body{margin:0;background:#000;color:#fff;font-family:Arial,sans-serif}.hdr{padding:18px;border-bottom:2px solid #c8102e}.logo{font-weight:900;letter-spacing:2px}.r{color:#c8102e}.wrap{max-width:760px;margin:0 auto;padding:18px 16px 80px}.card{background:#0a0a0a;border-left:3px solid #c8102e;padding:16px;margin:12px 0}label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:#aaa;margin-top:12px}select,input,button,textarea{width:100%;padding:13px;margin-top:6px;background:#111;border:1px solid #222;color:#fff;font-size:16px}button{background:#c8102e;border:0;font-weight:900;text-transform:uppercase;letter-spacing:1px;cursor:pointer}button.secondary{background:#222}button:disabled{background:#222;color:#555}.timer{font-size:42px;font-weight:900;text-align:center;letter-spacing:3px;margin:18px 0}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.result{background:#111;border:1px solid #222;padding:12px;margin:10px 0}.muted{color:#777;font-size:13px;line-height:1.45}.ok{color:#4caf50}.warn{color:#ff9800}.bad{color:#c8102e}.photos{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.photos img{width:100%;border-radius:6px;border:1px solid #222}.pill{display:inline-block;border:1px solid #333;padding:3px 8px;margin-top:8px;font-size:12px;color:#aaa}.topline{display:flex;justify-content:space-between;align-items:center;gap:10px}.smallbtn{padding:8px;font-size:12px;width:auto}.status{font-size:12px;color:#777}@media(max-width:560px){.row,.photos{grid-template-columns:1fr}.timer{font-size:36px}}
</style>
</head>
<body>
<header class="hdr"><div class="logo"><span class="r">cHIP</span> sHOP BXTN — LOAD TEST</div><div class="status" id="status">Connecting…</div></header>
<main class="wrap">
  <section class="card">
    <h2>⚡ Appliance Load Test</h2>
    <p class="muted">Upload a before meter photo, enter the reading, turn the appliance on for 5 minutes, then upload the after photo and save the result.</p>
    <label>Appliance</label>
    <select id="appliance"></select>
    <div class="row">
      <div><label>Before reading (kWh)</label><input id="before" type="number" step="0.001" inputmode="decimal" placeholder="e.g. 12345.678"></div>
      <div><label>Before meter photo</label><input id="beforePhoto" type="file" accept="image/*" capture="environment"></div>
    </div>
    <button class="secondary" onclick="startTimer()">Start 5 minute timer</button>
    <div class="timer" id="timer">05:00</div>
    <div class="row">
      <div><label>After reading (kWh)</label><input id="after" type="number" step="0.001" inputmode="decimal" placeholder="e.g. 12345.701"></div>
      <div><label>After meter photo</label><input id="afterPhoto" type="file" accept="image/*" capture="environment"></div>
    </div>
    <label>Notes / location</label><textarea id="notes" rows="2" placeholder="Optional notes"></textarea>
    <button id="saveBtn" onclick="saveTest()">Save Test</button>
    <div id="message" class="muted"></div>
  </section>
  <section class="card">
    <div class="topline"><h3>Results</h3><button class="smallbtn secondary" onclick="loadResults()">Refresh</button></div>
    <div id="results" class="muted">No results loaded yet.</div>
  </section>
</main>
<script>
const SUPABASE_URL='https://yiyjptjzpnkjxqpgycsk.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpeWpwdGp6cG5ranhxcGd5Y3NrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3Mjc0MTYsImV4cCI6MjA5MjMwMzQxNn0.DNHJ3e9qR0EQV3we-1f36RJPtg9fL42BZqn6jnvLVeI';
const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const BUCKET='power-test-photos';
const APPLIANCES=[
{id:'u1',name:'Fridge 1',type:'fridge',area:'kitchen'},
{id:'u2',name:'Fridge 2',type:'fridge',area:'kitchen'},
{id:'u3',name:'Fridge 3',type:'fridge',area:'kitchen'},
{id:'u4',name:'Fridge 4',type:'fridge',area:'kitchen'},
{id:'u5',name:'Fridge 5',type:'fridge',area:'kitchen'},
{id:'u6',name:'Fridge 6',type:'fridge',area:'bar'},
{id:'u7',name:'Freezer 1',type:'freezer',area:'kitchen'},
{id:'u8',name:'Freezer 2',type:'freezer',area:'bar'},
{id:'u9',name:'Freezer 3',type:'freezer',area:'bar'},
{id:'u10',name:'Freezer 4',type:'freezer',area:'bar'},
{id:'u11',name:'New Freezer - Cellar',type:'freezer',area:'bar'},
{id:'h1',name:'Large Heater 1',type:'heater',area:'site'},
{id:'h2',name:'Large Heater 2',type:'heater',area:'site'},
{id:'h3',name:'Large Heater 3',type:'heater',area:'site'}
];
let seconds=300,timer=null;
function init(){
 const sel=document.getElementById('appliance');
 APPLIANCES.forEach(a=>{const o=document.createElement('option');o.value=a.id;o.textContent=`${a.name} — ${a.type}${a.area?' · '+a.area:''}`;sel.appendChild(o)});
 document.getElementById('status').textContent='Supabase connected';
 loadResults();
}
function startTimer(){clearInterval(timer);seconds=300;drawTimer();timer=setInterval(()=>{seconds--;drawTimer();if(seconds<=0){clearInterval(timer);msg('Timer finished. Take the after photo and reading.','ok')}},1000)}
function drawTimer(){const m=Math.floor(seconds/60),s=seconds%60;document.getElementById('timer').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}
function msg(t,cls=''){const el=document.getElementById('message');el.className='muted '+cls;el.textContent=t}
async function uploadPhoto(file,applianceId,label){
 const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
 const path=`${applianceId}/${new Date().toISOString().replace(/[:.]/g,'-')}-${label}.${ext}`;
 const {error}=await db.storage.from(BUCKET).upload(path,file,{cacheControl:'3600',upsert:false});
 if(error)throw new Error('Photo upload failed: '+error.message);
 const {data}=db.storage.from(BUCKET).getPublicUrl(path);
 return data.publicUrl;
}
async function saveTest(){
 const btn=document.getElementById('saveBtn');btn.disabled=true;msg('Uploading photos and saving test…');
 try{
  const applianceId=document.getElementById('appliance').value;
  const appliance=APPLIANCES.find(a=>a.id===applianceId);
  const before=parseFloat(document.getElementById('before').value);
  const after=parseFloat(document.getElementById('after').value);
  const beforeFile=document.getElementById('beforePhoto').files[0];
  const afterFile=document.getElementById('afterPhoto').files[0];
  const notes=document.getElementById('notes').value.trim();
  if(!appliance)throw new Error('Choose an appliance.');
  if(!Number.isFinite(before)||!Number.isFinite(after))throw new Error('Enter both meter readings.');
  if(after<before)throw new Error('After reading cannot be lower than before reading.');
  if(!beforeFile||!afterFile)throw new Error('Upload both before and after photos.');
  const beforeUrl=await uploadPhoto(beforeFile,applianceId,'before');
  const afterUrl=await uploadPhoto(afterFile,applianceId,'after');
  const delta=after-before;
  const kw=delta*12;
  const row={appliance:appliance.name,appliance_id:appliance.id,appliance_type:appliance.type,area:appliance.area,before_reading:before,after_reading:after,delta_kwh:delta,kw,before_photo:beforeUrl,after_photo:afterUrl,notes};
  const {error}=await db.from('power_tests').insert(row);
  if(error)throw new Error('Database save failed: '+error.message);
  msg(`Saved ${appliance.name}: ${kw.toFixed(2)} kW`,'ok');
  document.getElementById('before').value='';document.getElementById('after').value='';document.getElementById('beforePhoto').value='';document.getElementById('afterPhoto').value='';document.getElementById('notes').value='';
  loadResults();
 }catch(e){console.error(e);msg(e.message,'bad')}finally{btn.disabled=false}
}
function classify(r){if(r.appliance_type==='heater')return r.kw>=1?'ok':'warn';if(r.kw>1)return'bad';if(r.kw>0.5)return'warn';return'ok'}
async function loadResults(){
 const box=document.getElementById('results');box.textContent='Loading…';
 const {data,error}=await db.from('power_tests').select('*').order('created_at',{ascending:false}).limit(50);
 if(error){box.innerHTML='<span class="bad">Could not load results: '+error.message+'</span>';return}
 if(!data||!data.length){box.textContent='No results yet.';return}
 box.innerHTML='';
 data.forEach(r=>{const div=document.createElement('div');div.className='result';const cls=classify(r);div.innerHTML=`<strong>${r.appliance}</strong> <span class="pill">${r.appliance_type||''}</span><br><span class="${cls}">${Number(r.kw).toFixed(2)} kW</span> · Δ ${Number(r.delta_kwh).toFixed(3)} kWh<br><span class="muted">${new Date(r.created_at).toLocaleString('en-GB')}${r.notes?' · '+r.notes:''}</span><div class="photos"><a href="${r.before_photo}" target="_blank"><img src="${r.before_photo}" alt="Before photo"></a><a href="${r.after_photo}" target="_blank"><img src="${r.after_photo}" alt="After photo"></a></div>`;box.appendChild(div)});
}
init();
</script>
</body>
</html>
